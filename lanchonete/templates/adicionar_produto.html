<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Produto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="topo">
        <h2>➕ Adicionar Produto</h2>
        <a href="{{ url_for('gerenciar_produtos') }}" class="btn-voltar">⬅ Voltar</a>
    </div>

    <form action="{{ url_for('adicionar_produto') }}" method="post" class="form-card" enctype="multipart/form-data">
        <div class="form-grupo">
            <label for="nome">Nome do Produto</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div class="form-grupo">
            <label for="preco">Preço (R$)</label>
            <input type="number" step="0.01" id="preco" name="preco" required>
        </div>

        <div class="form-grupo">
            <label for="categoria_id">Categoria</label>
            <select id="categoria_id" name="categoria_id" required>
                {% for categoria in categorias %}
                    <option value="{{ categoria.id }}">{{ categoria.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-grupo">
            <label for="acrescimos">Acréscimos Disponíveis</label>
            <select id="acrescimos" name="acrescimos" multiple>
                {% for acrescimo in acrescimos %}
                <option value="{{ acrescimo.id }}">{{ acrescimo.nome }} (+ R$ {{ "%.2f"|format(acrescimo.preco) }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-grupo">
            <label for="imagem">Imagem do Produto</label>
            <input type="file" id="imagem" name="imagem" accept="image/*">
        </div>

        <div class="form-grupo">
            <label>
                <input type="checkbox" name="destaque">
                Marcar como produto em destaque
            </label>
        </div>

        <button type="submit" class="btn">Salvar Produto</button>
    </form>

</div>

</body>
</html>
