{% extends "base.html" %}

{% block title %}Adicionar Acréscimo{% endblock %}

{% block content %}
<div class="main-content">
    <div class="container">
        <h2>➕ Adicionar Acréscimo</h2>
        <a href="{{ url_for('gerenciar_acrescimos') }}" class="btn-voltar">⬅ Voltar</a>
        <br><br>
        <form action="{{ url_for('adicionar_acrescimo') }}" method="post" class="form-card">
            <label for="nome">Nome do Acréscimo</label>
            <input type="text" id="nome" name="nome" required>

            <label for="preco">Preço</label>
            <input type="number" step="0.01" id="preco" name="preco" required>

            <button type="submit" class="btn">Salvar Acréscimo</button>
        </form>
    </div>
</div>
{% endblock %}
