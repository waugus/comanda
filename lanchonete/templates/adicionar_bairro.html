<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Adicionar Bairro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>➕ Novo Bairro</h2>

    <form method="post">
        <label>Nome</label>
        <input type="text" name="nome" required>

        <label>Taxa de entrega (R$)</label>
        <input type="text" name="taxa" placeholder="Ex: 5,00" required>

        <label>Tempo de entrega</label>
        <input type="text" name="tempo_entrega" placeholder="Ex: 35-50 min">

        <label>Tempo de retirada</label>
        <input type="text" name="tempo_retirada" placeholder="Ex: 15-25 min">

        <label class="check-row">
            <input type="checkbox" name="ativo" checked>
            Ativo
        </label>

        <button type="submit" class="btn">Salvar</button>
    </form>

    <a href="{{ url_for('gerenciar_bairros') }}" class="btn-voltar">⬅ Voltar</a>
</div>

</body>
</html>
